<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backrooms Game</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Main Menu Screen -->
    <div id="main-menu" class="screen active">
        <div class="menu-background" id="menu-bg"></div>
        <div class="menu-overlay"></div>
        <div class="menu-content">
            <h1 class="game-title">THE BACKROOMS</h1>
            <p class="game-subtitle">Level 0</p>
            <div class="menu-buttons">
                <button class="menu-btn" id="btn-start">Start</button>
                <button class="menu-btn" id="btn-options">Options</button>
            </div>
        </div>
    </div>

    <!-- Options Screen -->
    <div id="options-menu" class="screen">
        <div class="menu-background" id="options-bg"></div>
        <div class="menu-overlay"></div>
        <div class="menu-content">
            <h2 class="options-title">Options</h2>
            <div class="options-list">
                <div class="option-row">
                    <span class="option-label">Show FPS Counter</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-fps">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="option-row">
                    <span class="option-label">Mouse Sensitivity</span>
                    <input type="range" id="sensitivity-slider" min="1" max="10" value="5" class="range-slider">
                    <span class="range-value" id="sensitivity-value">5</span>
                </div>
                <div class="option-row">
                    <span class="option-label">Master Volume</span>
                    <input type="range" id="volume-slider" min="0" max="100" value="70" class="range-slider">
                    <span class="range-value" id="volume-value">70</span>
                </div>
            </div>
            <button class="menu-btn" id="btn-back">Back to Menu</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <canvas id="game-canvas"></canvas>
        <div id="crosshair">+</div>
        <button id="mobile-pause-btn" class="hidden">| |</button>
        <div id="fps-counter" class="hidden">FPS: 0.00</div>
        <!-- Stamina UI -->
        <div id="stamina-ui">
            <svg id="stamina-icon" viewBox="0 0 24 30" width="20" height="25">
                <!-- Running person silhouette -->
                <circle cx="17" cy="4" r="3" fill="white" stroke="black" stroke-width="0.8"/>
                <path d="M10 10 L14 8 L18 10 L20 16 L17 15 L15 18 L18 26 L15 26 L12 19 L10 26 L7 26 L10 17 L8 14 L5 16 L4 13 L10 10Z"
                      fill="white" stroke="black" stroke-width="0.6" stroke-linejoin="round"/>
            </svg>
            <div id="stamina-bar-container">
                <div id="stamina-bar-fill"></div>
            </div>
        </div>
        <div id="pause-menu" class="hidden">
            <div class="pause-overlay"></div>
            <div class="pause-content">
                <h2>Paused</h2>
                <button class="menu-btn" id="btn-resume">Resume</button>
                <button class="menu-btn" id="btn-quit">Quit to Menu</button>
            </div>
        </div>
    </div>

    <!-- Name Entry Screen -->
    <div id="name-entry" class="screen">
        <div class="menu-background"></div>
        <div class="menu-overlay"></div>
        <div class="menu-content">
            <h2 class="options-title">Enter Your Name</h2>
            <div class="name-entry-form">
                <div class="name-input-row">
                    <input type="text" id="name-input" class="name-text-input" placeholder="Your name..." maxlength="20" autocomplete="off" spellcheck="false">
                    <button id="name-arrow" class="name-arrow-btn">&#9654;</button>
                </div>
            </div>
            <button class="menu-btn" id="btn-name-back">Back to Menu</button>
        </div>
    </div>

    <!-- Lobby Screen -->
    <div id="lobby-screen" class="screen">
        <div class="menu-background"></div>
        <div class="menu-overlay"></div>
        <div class="lobby-layout">
            <!-- Left: Players in current lobby -->
            <div class="lobby-panel lobby-left">
                <h3 id="lobby-title" class="lobby-panel-title">Lobby</h3>
                <div id="lobby-player-list" class="lobby-player-list">
                    <div class="lobby-no-lobby">Not in a lobby</div>
                </div>
                <div class="lobby-left-buttons">
                    <button id="btn-start-game" class="menu-btn lobby-action-btn" style="display:none;">Start Game</button>
                    <button id="btn-leave-lobby" class="menu-btn lobby-action-btn" style="display:none;">Leave Lobby</button>
                </div>
            </div>

            <!-- Center: Lobby browser -->
            <div class="lobby-panel lobby-center">
                <h3 class="lobby-panel-title">Browse Lobbies</h3>
                <div id="lobby-browser-list" class="lobby-browser-list">
                    <div class="lobby-empty-msg">No lobbies found. Create one!</div>
                </div>
                <div class="lobby-center-buttons">
                    <button id="btn-create-lobby" class="menu-btn">Create Lobby</button>
                    <button id="btn-lobby-back" class="menu-btn">Back to Menu</button>
                </div>
                <div id="connection-status" class="status-disconnected">Connecting...</div>
            </div>

            <!-- Right: Chat -->
            <div class="lobby-panel lobby-right">
                <h3 class="lobby-panel-title">Chat</h3>
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input-row">
                    <input type="text" id="chat-input" class="chat-text-input" placeholder="Type a message..." maxlength="200" autocomplete="off">
                    <button id="chat-send" class="chat-send-btn">Send</button>
                </div>
            </div>
        </div>

        <!-- Create Lobby Dialog -->
        <div id="create-lobby-dialog" class="create-dialog">
            <div class="create-dialog-overlay"></div>
            <div class="create-dialog-content">
                <h3 class="options-title" style="font-size:1.6rem;margin-bottom:1.5rem;">Create Lobby</h3>
                <input type="text" id="create-lobby-name" class="name-text-input" placeholder="Lobby name..." maxlength="30" autocomplete="off">
                <div class="create-dialog-buttons">
                    <button id="create-lobby-back" class="menu-btn">Back</button>
                    <button id="create-lobby-confirm" class="menu-btn">Create</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Level Select Screen -->
    <div id="level-select" class="screen">
        <div class="menu-background"></div>
        <div class="menu-overlay"></div>
        <div class="menu-content">
            <h2 class="options-title">Select Level</h2>
            <div id="level-buttons" class="menu-buttons">
                <!-- Populated by JS -->
            </div>
            <button class="menu-btn" id="btn-level-back">Back to Menu</button>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="screen">
        <div class="loading-content">
            <p class="loading-hint" id="loading-hint">You hear a faint hum...</p>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loading-bar"></div>
            </div>
            <p id="loading-text">Initializing</p>
            <p class="loading-percent" id="loading-percent">0%</p>
        </div>
    </div>

    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- cannon.js — rigid body physics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <!-- Game Modules (load order matters: engines first, then systems, then orchestrators) -->
    <script src="js/props.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/textures.js"></script>
    <script src="js/movement.js"></script>
    <script src="js/lighting.js"></script>
    <script src="js/atmosphere.js"></script>
    <script src="js/environment.js"></script>
    <script src="js/player.js"></script>
    <script src="js/mobile.js"></script>
    <script src="js/network.js"></script>
    <script src="js/playerModel.js"></script>
    <script src="js/multiplayer.js"></script>
    <script src="js/lobby.js"></script>
    <script src="js/game.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
